<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdProtect</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial;
      background: #0b1220;
      color: #e5e7eb;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 20px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(59,130,246,0.15);
      color: #3b82f6;
      font-size: 12px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }

    p {
      color: #94a3b8;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .card {
      margin-top: 30px;
      background: #0f172a;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #1f2937;
      display: inline-block;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #111827;
      color: white;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: #3b82f6;
      color: white;
      margin-left: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .msg {
      margin-top: 15px;
      color: #22c55e;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="badge">AdProtect Beta</div>

    <h1>Stop wasting ad spend on out-of-stock products</h1>

    <p>
      Real-time inventory monitoring for Shopify + automatic ad protection system.
    </p>

    <div class="card">
      <input id="email" placeholder="Enter your email" />
      <button onclick="join()">Join waitlist</button>
      <div class="msg" id="msg"></div>
    </div>

  </div>

  <script>
    async function join() {
      const email = document.getElementById("email").value;

      const res = await fetch("/waitlist", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      document.getElementById("msg").innerText =
        res.ok ? "You're on the list." : "Error, try again.";
    }
  </script>
</body>
</html>
